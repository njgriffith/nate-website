<div class="internet-banner">
    <div style="font-size: 1.2em;">Address:</div>
    <select [(ngModel)]="selectedWebsite">
        <option *ngFor="let url of urls">{{url}}</option>
    </select>
    <img src="assets/msft/entire_network_globe-5.png">
</div>
<div *ngIf="!selectedWebsite" class="landing-page-container"></div>
<div *ngIf="selectedWebsite" class="sunken-panel webpage">
    <ng-container [ngComponentOutlet]="websites[selectedWebsite]"></ng-container>
</div>
